name: amic-vault-dev

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amic_vault}
      POSTGRES_USER: ${POSTGRES_USER:-amic_vault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amic_vault_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-amic-vault-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-amic-vault-minio-dev-password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-amic-vault-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-amic-vault-minio-dev-password}
      S3_BUCKET: ${S3_BUCKET:-amic-vault-dev}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        mc anonymous set none "local/$${S3_BUCKET}"
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "mc ls local/$${S3_BUCKET} >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: "no"

volumes:
  postgres-data:
  minio-data:
